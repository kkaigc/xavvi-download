name: Build Xavvi Desktop Client

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Private source branch or commit
        required: true
        default: main
        type: string
      release_tag:
        description: Public release tag
        required: true
        default: codex-v1.0.1
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-14
            os: mac
            platform: darwin
            arch: arm64
          - name: macOS x64
            runner: macos-15-intel
            os: mac
            platform: darwin
            arch: x64
          - name: Windows x64
            runner: windows-latest
            os: win
            platform: win32
            arch: x64

    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: kkaigc/tarui-clawhunt
          ref: ${{ inputs.source_ref }}
          ssh-key: ${{ secrets.SOURCE_REPO_SSH_KEY }}
          persist-credentials: false
          path: source

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: source/apps/codex/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir source/apps/codex install --frozen-lockfile

      - name: Set application version
        shell: bash
        run: |
          version="${{ inputs.release_tag }}"
          npm --prefix source/apps/codex version "${version#codex-v}" --no-git-tag-version --allow-same-version
        env:
          npm_config_git_tag_version: "false"

      - name: Prepare bundled Codex CLI
        shell: bash
        env:
          CODEX_PLATFORM: ${{ matrix.platform }}
          CODEX_ARCH: ${{ matrix.arch }}
        run: pnpm --dir source/apps/codex prepare:codex

      - name: Verify bundled Codex CLI
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "win" ]]; then binary="source/apps/codex/resources/bin/codex.exe"; else binary="source/apps/codex/resources/bin/codex"; fi
          "$binary" --version

      - name: Build renderer and run tests
        shell: bash
        run: |
          pnpm --dir source/apps/codex build
          pnpm --dir source/apps/codex test:electron

      - name: Package Electron client
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm --dir source/apps/codex exec electron-builder --${{ matrix.os }} --${{ matrix.arch }} --publish never

      - name: Create checksums
        shell: bash
        working-directory: source/apps/codex/release
        run: node ../scripts/create-checksums.mjs SHA256SUMS-${{ matrix.os }}-${{ matrix.arch }}.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xavvi-${{ matrix.os }}-${{ matrix.arch }}-${{ inputs.release_tag }}
          path: |
            source/apps/codex/release/*
            !source/apps/codex/release/*.yml
            !source/apps/codex/release/*.yaml
            !source/apps/codex/release/*.blockmap
          if-no-files-found: error

      - name: Publish public release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          for attempt in 1 2 3 4 5; do
            gh release view "$RELEASE_TAG" >/dev/null 2>&1 && break
            gh release create "$RELEASE_TAG" --title "Xavvi ${RELEASE_TAG#codex-v}" --generate-notes >/dev/null 2>&1 && break
            sleep $((attempt * 2))
          done
          gh release view "$RELEASE_TAG" >/dev/null
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find source/apps/codex/release -maxdepth 1 -type f \
            ! -name '*.yml' ! -name '*.yaml' ! -name '*.blockmap' -print0)
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
