name: Build Xavvi Desktop Client

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Private source branch or commit
        required: true
        default: main
        type: string
      release_tag:
        description: Public release tag
        required: true
        default: xavvi-v1.0.8
        type: string
      target:
        description: Client package target
        required: true
        default: win-exe
        type: choice
        options:
          - win-exe
          - mac-dmg-arm64
          - all

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.target == 'win-exe' && '[{"name":"Windows x64 EXE","runner":"windows-latest","os":"win","platform":"win32","arch":"x64"}]' || inputs.target == 'mac-dmg-arm64' && '[{"name":"macOS arm64 DMG","runner":"macos-14","os":"mac","platform":"darwin","arch":"arm64"}]' || '[{"name":"macOS arm64","runner":"macos-14","os":"mac","platform":"darwin","arch":"arm64"},{"name":"macOS x64","runner":"macos-15-intel","os":"mac","platform":"darwin","arch":"x64"},{"name":"Windows x64","runner":"windows-latest","os":"win","platform":"win32","arch":"x64"}]') }}

    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: kkaigc/tarui-clawhunt
          ref: ${{ inputs.source_ref }}
          ssh-key: ${{ secrets.SOURCE_REPO_SSH_KEY }}
          persist-credentials: false
          path: source

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: source/apps/codex/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir source/apps/codex install --frozen-lockfile

      - name: Set application version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          npm_config_git_tag_version: "false"
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^xavvi-v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release tag: $RELEASE_TAG"
            exit 1
          fi
          version="${RELEASE_TAG#xavvi-v}"
          npm --prefix source/apps/codex version "$version" --no-git-tag-version --allow-same-version
          test "$(node -p "require('./source/apps/codex/package.json').version")" = "$version"

      - name: Prepare bundled Codex CLI
        shell: bash
        env:
          CODEX_PLATFORM: ${{ matrix.platform }}
          CODEX_ARCH: ${{ matrix.arch }}
        run: pnpm --dir source/apps/codex prepare:codex

      - name: Verify bundled Codex CLI
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "win" ]]; then binary="source/apps/codex/resources/bin/codex.exe"; else binary="source/apps/codex/resources/bin/codex"; fi
          "$binary" --version

      - name: Verify Supabase build configuration
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_ANON_KEY"
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            "$VITE_SUPABASE_URL/rest/v1/app_version?select=id&limit=1" \
            -H "apikey: $VITE_SUPABASE_ANON_KEY")"
          test "$status" -ge 200 -a "$status" -lt 500

      - name: Build renderer and run tests
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          pnpm --dir source/apps/codex build
          pnpm --dir source/apps/codex test:electron

      - name: Configure production platform endpoint
        shell: bash
        env:
          CLAWOS_PLATFORM_API_URL: ${{ secrets.CLAWOS_PLATFORM_API_URL }}
        run: |
          test "$CLAWOS_PLATFORM_API_URL" = "https://xapi.xavvi.com"
          if ! curl --fail --silent --show-error --retry 2 --retry-all-errors --retry-delay 5 --connect-timeout 20 --max-time 60 \
            "$CLAWOS_PLATFORM_API_URL/api/health"; then
            echo "::warning::Production API health check was unreachable from the GitHub runner; endpoint identity and packaged config checks remain enforced."
          fi
          pnpm --dir source/apps/codex configure:release

      - name: Package Electron client
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          if [[ "${{ inputs.target }}" == "win-exe" ]]; then
            pnpm --dir source/apps/codex exec electron-builder --win nsis --x64 --publish never
          elif [[ "${{ inputs.target }}" == "mac-dmg-arm64" ]]; then
            pnpm --dir source/apps/codex exec electron-builder --mac dmg zip --arm64 --publish never
          else
            pnpm --dir source/apps/codex exec electron-builder --${{ matrix.os }} --${{ matrix.arch }} --publish never
          fi

      - name: Verify packaged application version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          expected_version="${RELEASE_TAG#xavvi-v}"
          asar="$(find source/apps/codex/release -type f -name 'app.asar' -print -quit)"
          test -n "$asar"
          node -e '
            const asar = require("./source/apps/codex/node_modules/.pnpm/@electron+asar@3.4.1/node_modules/@electron/asar")
            const document = JSON.parse(asar.extractFile(process.argv[1], "package.json").toString("utf8"))
            if (document.version !== process.argv[2]) throw new Error(`Packaged version ${document.version} does not match ${process.argv[2]}`)
          ' "$asar" "$expected_version"
          if [[ "${{ matrix.os }}" == "mac" ]]; then
            app_bundle="$(find source/apps/codex/release -type d -name 'Xavvi.app' -print -quit)"
            test -n "$app_bundle"
            test "$(plutil -extract CFBundleShortVersionString raw "$app_bundle/Contents/Info.plist")" = "$expected_version"
          fi

      - name: Verify packaged Electron modules
        shell: bash
        run: |
          asar="$(find source/apps/codex/release -type f -name 'app.asar' -print -quit)"
          test -n "$asar"
          node source/apps/codex/node_modules/.pnpm/@electron+asar@3.4.1/node_modules/@electron/asar/bin/asar.js list "$asar" > packaged-files.raw.txt
          tr '\\' '/' < packaged-files.raw.txt > packaged-files.txt
          missing=0
          for file in \
            /electron/main.cjs \
            /electron/desktop-endpoints.cjs \
            /electron/model-provider-config.cjs \
            /electron/runtime-paths.cjs \
            /electron/lib/codex-workspace.cjs \
            /electron/window-chrome.cjs \
            /dist/brand/xavvi-logo.svg \
            /dist-api/server.js; do
            if ! grep -Fx "$file" packaged-files.txt >/dev/null; then
              echo "::error::Packaged app.asar is missing $file"
              missing=1
            fi
          done
          test "$missing" -eq 0

      - name: Verify packaged endpoint configuration
        shell: bash
        run: |
          endpoint_file="$(find source/apps/codex/release -type f -path '*/config/endpoints.json' -print -quit)"
          test -n "$endpoint_file"
          node -e '
            const fs = require("node:fs")
            const document = JSON.parse(fs.readFileSync(process.argv[1], "utf8"))
            if (document.platform_api_url !== "https://xapi.xavvi.com") {
              throw new Error(`Unexpected packaged platform endpoint: ${document.platform_api_url}`)
            }
          ' "$endpoint_file"

      - name: Create checksums
        shell: bash
        working-directory: source/apps/codex/release
        run: node ../scripts/create-checksums.mjs SHA256SUMS-${{ matrix.os }}-${{ matrix.arch }}.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xavvi-${{ matrix.os }}-${{ matrix.arch }}-${{ inputs.release_tag }}
          path: |
            source/apps/codex/release/*.dmg
            source/apps/codex/release/*.exe
            source/apps/codex/release/*.zip
            source/apps/codex/release/*.yml
            source/apps/codex/release/*.blockmap
            source/apps/codex/release/SHA256SUMS-*.txt
          if-no-files-found: error

      - name: Preserve updater assets for platforms not rebuilt
        if: inputs.target != 'all'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: kkaigc/xavvi-download
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          previous_tag="$(gh api "repos/$GH_REPO/releases/latest" --jq .tag_name 2>/dev/null || true)"
          if [[ -z "$previous_tag" || "$previous_tag" == "$RELEASE_TAG" ]]; then
            exit 0
          fi
          mkdir -p preserved-release-assets
          if [[ "${{ inputs.target }}" == "win-exe" ]]; then
            patterns=('mac-*.yml' 'SHA256SUMS-mac-*.txt' 'Xavvi-*-mac-*')
          else
            patterns=('win-*.yml' 'SHA256SUMS-win-*.txt' 'Xavvi-*-win-*')
          fi
          for pattern in "${patterns[@]}"; do
            gh release download "$previous_tag" --repo "$GH_REPO" --dir preserved-release-assets --pattern "$pattern" --skip-existing || true
          done
          find preserved-release-assets -maxdepth 1 -type f -print

      - name: Publish public release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: kkaigc/xavvi-download
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          for attempt in 1 2 3 4 5; do
            gh release view "$RELEASE_TAG" >/dev/null 2>&1 && break
            gh release create "$RELEASE_TAG" --title "Xavvi ${RELEASE_TAG#xavvi-v}" --generate-notes >/dev/null 2>&1 && break
            sleep $((attempt * 2))
          done
          gh release view "$RELEASE_TAG" >/dev/null
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find source/apps/codex/release -maxdepth 1 -type f \
            ! -name 'builder-debug.yml' ! -name 'builder-effective-config.yaml' -print0)
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find preserved-release-assets -maxdepth 1 -type f -print0 2>/dev/null || true)
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          gh release edit "$RELEASE_TAG" --latest
          gh release view xavvi-latest >/dev/null 2>&1 || \
            gh release create xavvi-latest --title "Xavvi Desktop Updater Feed" \
              --notes "Stable updater feed. Use versioned xavvi-v tags for direct downloads."
          gh release upload xavvi-latest "${files[@]}" --clobber
